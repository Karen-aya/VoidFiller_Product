name: Ocean Asset Publish

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # 1時間に1回自動実行

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Node.js 24への強制移行に対応
    steps:
      - uses: actions/checkout@v6 # v4からv6へ更新
      
      - name: Setup Node.js
        uses: actions/setup-node@v6 # v4からv6へ更新
        with:
          node-version: '24' # Node.js 24を使用
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Publish Script
        env:
          OCEAN_PRIVATE_KEY: ${{ secrets.OCEAN_PRIVATE_KEY }}
          RPC_URL: "https://polygon-bor-rpc.publicnode.com" # 安定性の高いRPCに変更
        run: node ocean_recover_ddo.js
