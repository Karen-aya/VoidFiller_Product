name: Ocean Asset Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2026年最新仕様: 自前ノード (Ocean Node) を起動
      - name: Launch Ocean Node
        run: |
          docker run -d \
            --name ocean-node \
            -e 'PRIVATE_KEY=${{ secrets.OCEAN_PRIVATE_KEY }}' \
            -e 'RPCS={"137":{"rpc":"https://polygon-bor-rpc.publicnode.com"}}' \
            -e 'DB_TYPE=sqlite' \
            -p 8000:8000 \
            oceanprotocol/ocean-node:latest
          
          echo "Waiting for Ocean Node to be ready..."
          # 接続できるようになるまで最大15回(150秒)チェックする
          for i in {1..15}; do
            if curl -s http://localhost:8000 > /dev/null; then
              echo "Ocean Node is UP and Running!"
              break
            fi
            echo "Still waiting for node... ($i/15)"
            sleep 10
          done

      - name: Install dependencies
        run: npm install
        
      - name: Run Publish Script
        env:
          OCEAN_PRIVATE_KEY: ${{ secrets.OCEAN_PRIVATE_KEY }}
          RPC_URL: "https://polygon-bor-rpc.publicnode.com"
          AQUARIUS_URL: "http://localhost:8000"
          PROVIDER_URL: "http://localhost:8000"
        run: node ocean_recover_ddo.js
