name: Ocean Asset Publish

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # 1時間に1回自動実行

# ↓ ここ（一番上の階層）に書くことで、全体に適用されます
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Publish Script
        env:
          OCEAN_PRIVATE_KEY: ${{ secrets.OCEAN_PRIVATE_KEY }}
          RPC_URL: "https://polygon-bor-rpc.publicnode.com"
        run: node ocean_recover_ddo.js
